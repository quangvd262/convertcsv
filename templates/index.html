<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV → XLSX Converter</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <style>
    body { background: #f8f9fa; }
    #drop-zone {
      border: 2px dashed #6c757d;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.dragover {
      border-color: #0d6efd;
      background: #e8f0fe;
    }
    #preview-section { display: none; }
    #preview-table-wrap {
      overflow-x: auto;
      max-height: 420px;
      overflow-y: auto;
    }
    #preview-table-wrap table {
      font-size: 0.82rem;
      white-space: nowrap;
    }
    #spinner { display: none; }
  </style>
</head>
<body>
<div class="container py-5" style="max-width: 960px;">
  <h1 class="fw-bold mb-1">CSV → XLSX Converter</h1>
  <p class="text-muted mb-4">Upload a CSV file, preview the data, then download as Excel.</p>

  <!-- Upload area -->
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#6c757d" class="mb-3" viewBox="0 0 16 16">
      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
      <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
    </svg>
    <p class="mb-1 fw-semibold">Drop CSV file here</p>
    <p class="text-muted small">or click to browse &nbsp;·&nbsp; max 10 MB</p>
    <input type="file" id="file-input" accept=".csv" class="d-none" />
  </div>

  <!-- Spinner -->
  <div id="spinner" class="text-center my-4">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Converting…</p>
  </div>

  <!-- Error alert -->
  <div id="error-alert" class="alert alert-danger mt-3 d-none" role="alert"></div>

  <!-- Preview section -->
  <div id="preview-section" class="mt-4">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <div>
        <span class="fw-semibold" id="file-label"></span>
        <span class="badge bg-secondary ms-2" id="row-badge"></span>
      </div>
      <a id="download-btn" href="#" class="btn btn-success btn-sm px-4">
        ⬇ Download XLSX
      </a>
    </div>
    <div id="preview-table-wrap"></div>
    <p class="text-muted small mt-1">Showing first 100 rows.</p>
  </div>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const spinner = document.getElementById('spinner');
  const errorAlert = document.getElementById('error-alert');
  const previewSection = document.getElementById('preview-section');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    if (!file.name.toLowerCase().endsWith('.csv')) {
      showError('Only .csv files are supported.');
      return;
    }
    hideError();
    previewSection.style.display = 'none';
    spinner.style.display = 'block';

    const fd = new FormData();
    fd.append('file', file);

    fetch('/upload', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(data => {
        spinner.style.display = 'none';
        if (data.error) { showError(data.error); return; }

        document.getElementById('file-label').textContent = data.filename;
        document.getElementById('row-badge').textContent =
          `${data.rows.toLocaleString()} rows × ${data.cols} cols`;
        document.getElementById('download-btn').href = '/download/' + data.token;
        document.getElementById('preview-table-wrap').innerHTML = data.preview_html;
        previewSection.style.display = 'block';

        // Reset file input so same file can be re-uploaded
        fileInput.value = '';
      })
      .catch(err => {
        spinner.style.display = 'none';
        showError('Upload failed: ' + err.message);
      });
  }

  function showError(msg) {
    errorAlert.textContent = msg;
    errorAlert.classList.remove('d-none');
  }
  function hideError() {
    errorAlert.classList.add('d-none');
  }
</script>
</body>
</html>
